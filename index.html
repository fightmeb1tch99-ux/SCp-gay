<!DOCTYPE html>
<html lang="ru">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>SECURE CONTAINMENT DATABASE</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       :root {
           --bg-color: #0b0f12;
           --text-color: #00ff41;
           --text-dim: #008f11;
           --warning: #ff0000;
           --warning-dim: #8b0000;
           --safe: #00ff41;
           --euclid: #ffff00;
           --keter: #ff0000;
           --thaumiel: #00ffff;
           --apollyon: #ff00ff;
           --scan-line: rgba(0, 255, 65, 0.03);
       }

       @keyframes scan {
           0% { transform: translateY(-100%); }
           100% { transform: translateY(100vh); }
       }

       @keyframes blink {
           0%, 50% { opacity: 1; }
           51%, 100% { opacity: 0; }
       }

       @keyframes glitch {
           0% { transform: translate(0); }
           20% { transform: translate(-2px, 2px); }
           40% { transform: translate(-2px, -2px); }
           60% { transform: translate(2px, 2px); }
           80% { transform: translate(2px, -2px); }
           100% { transform: translate(0); }
       }

       @keyframes flicker {
           0% { opacity: 0.97; }
           5% { opacity: 0.95; }
           10% { opacity: 0.9; }
           15% { opacity: 0.95; }
           20% { opacity: 0.99; }
           25% { opacity: 0.95; }
           30% { opacity: 0.9; }
           35% { opacity: 0.96; }
           40% { opacity: 0.98; }
           45% { opacity: 0.95; }
           50% { opacity: 0.99; }
           55% { opacity: 0.93; }
           60% { opacity: 0.9; }
           65% { opacity: 0.96; }
           70% { opacity: 1; }
           75% { opacity: 0.97; }
           80% { opacity: 0.95; }
           85% { opacity: 0.92; }
           90% { opacity: 0.96; }
           95% { opacity: 0.99; }
           100% { opacity: 0.94; }
       }

       body {
           background-color: var(--bg-color);
           color: var(--text-color);
           font-family: 'Courier New', Courier, monospace;
           min-height: 100vh;
           overflow-x: hidden;
           position: relative;
       }

       body::before {
           content: '';
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background: repeating-linear-gradient(
               0deg,
               var(--scan-line),
               var(--scan-line) 1px,
               transparent 1px,
               transparent 2px
           );
           pointer-events: none;
           z-index: 1000;
       }

       body::after {
           content: '';
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100px;
           background: linear-gradient(
               180deg,
               transparent,
               rgba(0, 255, 65, 0.1),
               transparent
           );
           animation: scan 8s linear infinite;
           pointer-events: none;
           z-index: 999;
       }

       .container {
           max-width: 1200px;
           margin: 0 auto;
           padding: 20px;
           position: relative;
           z-index: 1;
           animation: flicker 0.15s infinite;
       }

       header {
           text-align: center;
           padding: 40px 20px;
           border-bottom: 2px solid var(--text-dim);
           margin-bottom: 30px;
           position: relative;
       }

       header::after {
           content: '';
           position: absolute;
           bottom: -2px;
           left: 0;
           width: 100%;
           height: 2px;
           background: linear-gradient(90deg, transparent, var(--text-color), transparent);
           animation: scan 3s linear infinite;
       }

       h1 {
           font-size: 2.5rem;
           letter-spacing: 8px;
           text-transform: uppercase;
           margin-bottom: 10px;
           text-shadow: 0 0 10px var(--text-color);
       }

       .subtitle {
           color: var(--warning);
           font-size: 1.2rem;
           letter-spacing: 4px;
           animation: blink 2s infinite;
       }

       .controls {
           display: flex;
           flex-wrap: wrap;
           gap: 15px;
           margin-bottom: 30px;
           padding: 20px;
           background: rgba(0, 255, 65, 0.05);
           border: 1px solid var(--text-dim);
       }

       input[type="text"] {
           flex: 1;
           min-width: 200px;
           padding: 12px;
           background: var(--bg-color);
           border: 1px solid var(--text-dim);
           color: var(--text-color);
           font-family: inherit;
           font-size: 1rem;
           outline: none;
           transition: all 0.3s;
       }

       input[type="text"]:focus {
           border-color: var(--text-color);
           box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
       }

       .filter-group {
           display: flex;
           gap: 10px;
           flex-wrap: wrap;
       }

       button {
           padding: 12px 20px;
           background: transparent;
           border: 1px solid var(--text-dim);
           color: var(--text-color);
           font-family: inherit;
           cursor: pointer;
           transition: all 0.3s;
           text-transform: uppercase;
           letter-spacing: 2px;
           font-size: 0.9rem;
       }

       button:hover {
           background: rgba(0, 255, 65, 0.1);
           border-color: var(--text-color);
           text-shadow: 0 0 5px var(--text-color);
       }

       button.active {
           background: var(--text-color);
           color: var(--bg-color);
       }

       button.random {
           border-color: var(--warning);
           color: var(--warning);
       }

       button.random:hover {
           background: rgba(255, 0, 0, 0.1);
           box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
       }

       .grid {
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
           gap: 20px;
           margin-bottom: 100px;
       }

       .card {
           background: rgba(0, 20, 0, 0.3);
           border: 2px solid;
           padding: 20px;
           cursor: pointer;
           transition: all 0.3s;
           position: relative;
           overflow: hidden;
       }

       .card::before {
           content: '';
           position: absolute;
           top: 0;
           left: -100%;
           width: 100%;
           height: 100%;
           background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
           transition: left 0.5s;
       }

       .card:hover::before {
           left: 100%;
       }

       .card:hover {
           transform: translateY(-2px);
           box-shadow: 0 5px 20px rgba(0, 255, 65, 0.2);
       }

       .card.safe { border-color: var(--safe); }
       .card.euclid { border-color: var(--euclid); }
       .card.keter { border-color: var(--keter); }
       .card.thaumiel { border-color: var(--thaumiel); }
       .card.apollyon { border-color: var(--apollyon); }

       .card-header {
           display: flex;
           justify-content: space-between;
           align-items: center;
           margin-bottom: 15px;
           padding-bottom: 10px;
           border-bottom: 1px solid currentColor;
       }

       .scp-id {
           font-size: 1.3rem;
           font-weight: bold;
           letter-spacing: 2px;
       }

       .class-badge {
           padding: 5px 15px;
           font-size: 0.8rem;
           letter-spacing: 2px;
           text-transform: uppercase;
           border: 1px solid currentColor;
       }

       .card.safe .class-badge { color: var(--safe); }
       .card.euclid .class-badge { color: var(--euclid); }
       .card.keter .class-badge { color: var(--keter); }
       .card.thaumiel .class-badge { color: var(--thaumiel); }
       .card.apollyon .class-badge { color: var(--apollyon); }

       .preview {
           color: var(--text-dim);
           font-size: 0.9rem;
           line-height: 1.6;
       }

       .details {
           max-height: 0;
           overflow: hidden;
           transition: max-height 0.5s ease-out;
           margin-top: 15px;
           padding-top: 15px;
           border-top: 1px solid var(--text-dim);
       }

       .details.open {
           max-height: 500px;
       }

       .section {
           margin-bottom: 15px;
       }

       .section-title {
           color: var(--text-color);
           font-size: 0.8rem;
           letter-spacing: 3px;
           text-transform: uppercase;
           margin-bottom: 8px;
           opacity: 0.8;
       }

       .section-content {
           color: var(--text-dim);
           line-height: 1.6;
           padding-left: 15px;
           border-left: 2px solid var(--text-dim);
       }

       .console {
           position: fixed;
           bottom: 0;
           left: 0;
           width: 100%;
           height: 120px;
           background: rgba(0, 0, 0, 0.95);
           border-top: 2px solid var(--text-dim);
           padding: 15px;
           font-size: 0.85rem;
           overflow-y: auto;
           z-index: 100;
       }

       .console-line {
           margin-bottom: 5px;
           opacity: 0;
           animation: fadeIn 0.3s forwards;
       }

       @keyframes fadeIn {
           to { opacity: 1; }
       }

       .timestamp {
           color: var(--text-dim);
           margin-right: 10px;
       }

       .status-granted { color: var(--safe); }
       .status-denied { color: var(--warning); }
       .status-warning { color: var(--euclid); }

       .cursor {
           display: inline-block;
           width: 10px;
           height: 18px;
           background: var(--text-color);
           animation: blink 1s infinite;
           margin-left: 5px;
           vertical-align: middle;
       }

       .modal {
           display: none;
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           background: rgba(0, 0, 0, 0.95);
           z-index: 2000;
           justify-content: center;
           align-items: center;
           padding: 20px;
       }

       .modal.active {
           display: flex;
           animation: glitch 0.3s;
       }

       .modal-content {
           max-width: 600px;
           width: 100%;
           border: 2px solid var(--text-color);
           background: var(--bg-color);
           padding: 30px;
           position: relative;
           box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
       }

       .modal-close {
           position: absolute;
           top: 10px;
           right: 15px;
           font-size: 1.5rem;
           cursor: pointer;
           color: var(--warning);
       }

       .modal-close:hover {
           text-shadow: 0 0 10px var(--warning);
       }

       @media (max-width: 768px) {
           h1 { font-size: 1.5rem; letter-spacing: 4px; }
           .subtitle { font-size: 1rem; }
           .grid { grid-template-columns: 1fr; }
           .controls { flex-direction: column; }
           .filter-group { justify-content: center; }
           .console { height: 100px; font-size: 0.75rem; }
       }
   </style>
</head>
<body>
   <div class="container">
       <header>
           <h1>SECURE CONTAINMENT DATABASE</h1>
           <div class="subtitle">ACCESS LEVEL 3 REQUIRED</div>
       </header>

       <div class="controls">
           <input type="text" id="search" placeholder="SEARCH DATABASE...">
           <div class="filter-group">
               <button class="filter-btn active" data-filter="all">ALL</button>
               <button class="filter-btn" data-filter="safe">SAFE</button>
               <button class="filter-btn" data-filter="euclid">EUCLID</button>
               <button class="filter-btn" data-filter="keter">KETER</button>
               <button class="filter-btn" data-filter="thaumiel">THAUMIEL</button>
               <button class="filter-btn" data-filter="apollyon">APOLLYON</button>
           </div>
           <button class="random" onclick="randomSCP()">RANDOM SCP</button>
       </div>

       <div class="grid" id="grid"></div>
   </div>

   <div class="console" id="console">
       <div class="console-line"><span class="timestamp">[00:00:00]</span>SYSTEM INITIALIZED...</div>
   </div>

   <div class="modal" id="modal">
       <div class="modal-content" id="modalContent">
           <span class="modal-close" onclick="closeModal()">×</span>
       </div>
   </div>

   <script>
       const scps = [
           {
               id: 'SCP-VADIM-01',
               class: 'euclid',
               description: 'Искажение времени ожидания, чрезмерно долгие сборы',
               procedures: 'Уведомлять заранее, иметь запас еды',
               notes: 'Объект демонстрирует способность замедлять субъективное восприятие времени в радиусе 5 метров. Эффект усиливается при попытках торопить объект.'
           },
           {
               id: 'SCP-ALEX-02',
               class: 'safe',
               description: 'Историк, вызывает философские разговоры',
               procedures: 'Книги, чай, спокойная среда',
               notes: 'Не представляет прямой угрозы. Разговоры могут продолжаться 4-6 часов. Рекомендуется назначать встречи в выходные.'
           },
           {
               id: 'SCP-NIKOLAI-03',
               class: 'keter',
               description: 'Крупный, эксперт по аниме, бесконечный binge-watch',
               procedures: 'Ограничивать Wi-Fi ночью',
               notes: 'КРИТИЧЕСКИЙ УРОВЕНЬ УГРОЗЫ. Способен просматривать контент без сна до 72 часов. Требуется постоянный мониторинг.'
           },
           {
               id: 'SCP-AITAL-04',
               class: 'thaumiel',
               description: 'Харизматичный, повышает мораль команды',
               procedures: 'Использовать как союзника',
               notes: 'Ценный актив Фонда. Способен повышать продуктивность персонала на 40%. Рекомендуется присутствие на всех брифингах.'
           },
           {
               id: 'SCP-NYURGUN-05',
               class: 'euclid',
               description: 'Тактическая подготовка, боевой опыт',
               procedures: 'Контроль стресс-факторов',
               notes: 'Требуется регулярная разрядка агрессии через физическую активность. Избегать триггерных ситуаций.'
           },
           {
               id: 'SCP-ICEBERG-06',
               class: 'apollyon',
               description: 'Известен всем, но информации нет',
               procedures: 'Пассивное наблюдение',
               notes: 'НЕВОЗМОЖНО СДЕРЖАТЬ. НЕВОЗМОЖНО ОБЪЯСНИТЬ. ВСЕ ПОПЫТКИ ИССЛЕДОВАНИЯ ПРЕСЕКАЮТСЯ НА ВЫСШЕМ УРОВНЕ.'
           }
       ];

       let currentFilter = 'all';
       let searchTerm = '';

       function log(message, type = 'normal') {
           const console = document.getElementById('console');
           const timestamp = new Date().toLocaleTimeString('ru-RU', { hour12: false });
           const line = document.createElement('div');
           line.className = 'console-line';
           
           let statusClass = '';
           if (type === 'granted') statusClass = 'status-granted';
           if (type === 'denied') statusClass = 'status-denied';
           if (type === 'warning') statusClass = 'status-warning';
           
           line.innerHTML = `<span class="timestamp">[${timestamp}]</span><span class="${statusClass}">${message}</span><span class="cursor"></span>`;
           console.appendChild(line);
           console.scrollTop = console.scrollHeight;
           
           if (console.children.length > 20) {
               console.removeChild(console.firstChild);
           }
       }

       function getClassColor(className) {
           const colors = {
               safe: '#00ff41',
               euclid: '#ffff00',
               keter: '#ff0000',
               thaumiel: '#00ffff',
               apollyon: '#ff00ff'
           };
           return colors[className] || '#00ff41';
       }

       function renderGrid() {
           const grid = document.getElementById('grid');
           grid.innerHTML = '';
           
           const filtered = scps.filter(scp => {
               const matchesFilter = currentFilter === 'all' || scp.class === currentFilter;
               const matchesSearch = scp.id.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                   scp.description.toLowerCase().includes(searchTerm.toLowerCase());
               return matchesFilter && matchesSearch;
           });

           filtered.forEach((scp, index) => {
               const card = document.createElement('div');
               card.className = `card ${scp.class}`;
               card.style.animationDelay = `${index * 0.1}s`;
               card.innerHTML = `
                   <div class="card-header">
                       <div class="scp-id">${scp.id}</div>
                       <div class="class-badge">${scp.class}</div>
                   </div>
                   <div class="preview">${scp.description}</div>
                   <div class="details" id="details-${index}">
                       <div class="section">
                           <div class="section-title">Описание:</div>
                           <div class="section-content">${scp.description}</div>
                       </div>
                       <div class="section">
                           <div class="section-title">Процедуры содержания:</div>
                           <div class="section-content">${scp.procedures}</div>
                       </div>
                       <div class="section">
                           <div class="section-title">Примечания:</div>
                           <div class="section-content">${scp.notes}</div>
                       </div>
                   </div>
               `;
               
               card.onclick = () => toggleDetails(index, scp.id);
               grid.appendChild(card);
           });

           log(`LOADED ${filtered.length} RECORDS`, 'granted');
       }

       function toggleDetails(index, id) {
           const details = document.getElementById(`details-${index}`);
           const isOpen = details.classList.contains('open');
           
           document.querySelectorAll('.details').forEach(d => d.classList.remove('open'));
           
           if (!isOpen) {
               details.classList.add('open');
               log(`FILE ACCESSED: ${id}`, 'granted');
           }
       }

       function randomSCP() {
           const random = scps[Math.floor(Math.random() * scps.length)];
           const modal = document.getElementById('modal');
           const content = document.getElementById('modalContent');
           
           content.innerHTML = `
               <span class="modal-close" onclick="closeModal()">×</span>
               <div class="card-header" style="border-color: ${getClassColor(random.class)}; color: ${getClassColor(random.class)}">
                   <div class="scp-id">${random.id}</div>
                   <div class="class-badge" style="border-color: ${getClassColor(random.class)}; color: ${getClassColor(random.class)}">${random.class}</div>
               </div>
               <div class="section">
                   <div class="section-title">Описание:</div>
                   <div class="section-content">${random.description}</div>
               </div>
               <div class="section">
                   <div class="section-title">Процедуры содержания:</div>
                   <div class="section-content">${random.procedures}</div>
               </div>
               <div class="section">
                   <div class="section-title">Примечания:</div>
                   <div class
